name: Update Measles Data

on:
  schedule:
    - cron: '0 9 * * 4'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-measles-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Update measles data
        run: node update-measles-data.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add index.html

          if git diff --cached --quiet; then
            echo "No measles data changes to commit."
            exit 0
          fi

          git commit -m "Auto-update measles data - $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Measles Data Update Failed',
              body: 'The automated measles data update failed. Please check the workflow logs and fix any issues.',
              labels: ['bug', 'automated']
            });
